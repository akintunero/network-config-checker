hostname core-sw-01
!
service password-encryption
!
enable secret 9 $9$NqPTP0Q4Y8T8K8K8K8K8K8K8K8K8K8K
!
no ip http server
no ip http secure-server
!
ip ssh version 2
ip ssh time-out 60
ip ssh authentication-retries 3
!
logging buffered 32768
logging host 10.2.2.50
!
ntp server 10.1.1.1 prefer
ntp server 10.1.1.2
!
line con 0
 login local
 logging synchronous
!
line vty 0 4
 login local
 transport input ssh
!
interface GigabitEthernet1/0/1
 description Downlink to access layer
 ip address 10.20.1.1 255.255.255.252
!
interface GigabitEthernet1/0/2
 description Inter-rack link
 ip address 10.20.2.1 255.255.255.252
!
end
